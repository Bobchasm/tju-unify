# 天津大学新闻网栏目入口（列表页），爬虫由此抓取详情链接并入库
tju:
  news:
    category:
      - https://news.tju.edu.cn/xw/xsx.htm
      - https://news.tju.edu.cn/xw/fmxw.htm
      - https://news.tju.edu.cn/xw/zhxw.htm
      - https://news.tju.edu.cn/xw/xsky.htm
      - https://news.tju.edu.cn/xw/rcpy.htm
      - https://news.tju.edu.cn/xw/xysx.htm
    crawler:
      enabled: true
      # 应用启动后首次爬取延迟（毫秒），避免与 DB/Eureka 同时初始化
      initial-delay-ms: 120000
      # 两次爬取之间的间隔（毫秒），默认 1 小时
      fixed-delay-ms: 3600000