server:
  port: 8888

spring:
  application:
    name: user-service

  cloud:
    nacos:
      discovery:
        server-addr: ${elm.nacos.server-addr}
        namespace: public  # 明确指定 namespace
        group: DEFAULT_GROUP
        username: ${elm.nacos.username}
        password: ${elm.nacos.pw}
        ip: 127.0.0.1  # 本地IP（如果是本机测试）
        port: ${server.port}  # 服务端口
        enabled: true  # 明确启用
        register-enabled: true  # 允许注册
        # 网络配置
        metadata:
          version: 1.0
        # 健康检查
        heartbeat:
          interval: 5000  # 心跳间隔（毫秒）

  profiles:
    active: dev
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${elm.db.host}:3306/elm_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          username: ${elm.db.username}
          password: ${elm.db.pw}
        slave:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${elm.db.host}:${elm.db.slave.port:3307}/elm_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          username: ${elm.db.slave.username:${elm.db.username}}
          password: ${elm.db.slave.pw:${elm.db.pw}}

  data:
    redis:
      host: ${elm.data.redis.host}
      port: 6379
      password: ${elm.data.redis.password}
      database: ${elm.data.redis.database}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis:
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true
  mapper-locations:
    - classpath*:/mapper/*.xml

jwt:
  secret: abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz123456
  token-validity-in-seconds: 86400
  token-validity-in-seconds-for-remember-me: 108000

# swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui

# Jaeger 追踪配置
management:
  tracing:
    sampling:
      probability: 1.0  # 采样率：1.0=100%（开发环境），生产环境建议0.1-0.5
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,tracing

# Jaeger 配置
tracing:
  jaeger:
    enabled: true
    agent:
      host: 8.152.215.39  # 主服务器IP
      port: 14268  # Jaeger Agent HTTP 端口（UDP 端口是 6831）
    sampler:
      type: const  # const=固定采样率, ratelimiting=速率限制, probabilistic=概率采样
      param: 1     # 1=100%采样，0.1=10%采样

logging:
  level:
    com.tju.elm: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
